name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag version (vX.Y.Z)"
        required: true
      prerelease:
        description: "Create as prerelease"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            arch: aarch64
            tauriArgs: "--target aarch64-apple-darwin"
          - os: macos-latest
            platform: macos
            arch: x86_64
            tauriArgs: "--target x86_64-apple-darwin"
          - os: windows-latest
            platform: windows
            arch: x86_64
            tauriArgs: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "ORI-SSHManager ${{ inputs.tag || github.ref_name }}"
          releaseBody: "See the assets to download and install ORI-SSHManager."
          releaseDraft: true
          prerelease: ${{ inputs.prerelease || false }}
          args: ${{ matrix.tauriArgs }}
